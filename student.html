<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生徒用画面 | マークシート採点システム</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#1a2747;--gold:#c8a45c;--bg:#f4f5f8;--line:#e2e5ec;--green:#1e7e4f;--red:#c0392b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Yu Gothic","Hiragino Sans",sans-serif;background:var(--bg);color:#222;}
  header{background:var(--navy);color:#fff;padding:16px 28px;display:flex;align-items:center;gap:12px;}
  header h1{font-size:18px;}
  header .tag{background:var(--gold);color:var(--navy);font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700;}
  .wrap{max-width:720px;margin:30px auto;padding:0 20px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:20px;}
  .card h2{font-size:15px;color:var(--navy);margin-bottom:16px;border-left:4px solid var(--gold);padding-left:10px;}
  label{display:block;font-size:13px;color:#555;margin:10px 0 4px;}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  button{cursor:pointer;border:none;border-radius:8px;font-size:14px;font-weight:700;padding:11px 20px;background:var(--navy);color:#fff;width:100%;margin-top:14px;}
  .gate{max-width:380px;margin:70px auto;}
  .hide{display:none;}
  .res{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:14px 0;}
  .res .meta{font-size:13px;color:#666;}
  .res .meta b{display:block;font-size:15px;color:#222;}
  .res .score{font-size:22px;font-weight:800;color:var(--navy);}
  .res .score small{font-size:13px;color:#999;}
  .empty{color:#999;text-align:center;padding:24px;font-size:14px;}
</style>
</head>
<body>
<header>
  <h1>マークシート採点システム</h1>
  <span class="tag">生徒用</span>
</header>

<div class="wrap gate" id="gate">
  <div class="card">
    <h2>ログイン</h2>
    <label>学校コード</label><input id="code" placeholder="先生から伝えられた学校コード">
    <label>あなたのID</label><input id="sid" placeholder="マークシートに書いたID">
    <button onclick="studentLogin()">結果を確認する</button>
  </div>
</div>

<div class="wrap hide" id="main">
  <div class="card">
    <h2>あなたの成績</h2>
    <div id="resList"></div>
    <div class="empty hide" id="empty">まだ採点結果がありません</div>
  </div>
</div>

<script src="config.js"></script>
<script>
async function studentLogin(){
  try{
    const code=val("code"), sid=val("sid");
    if(!code||!sid){ alert("学校コードとIDを入力してください"); return; }

    // 学校を探す
    const {data:school, error:schoolErr}=await sb.from("schools")
      .select("id,name").eq("school_code",code).maybeSingle();
    if(schoolErr){ alert("通信エラー: "+schoolErr.message); return; }
    if(!school){ alert("学校コードが見つかりません"); return; }

    // この生徒の結果を取得（テーブル連結を使わない）
    const {data:results, error:resErr}=await sb.from("results")
      .select("*")
      .eq("school_id",school.id).eq("student_id",sid)
      .order("created_at",{ascending:false});
    if(resErr){ alert("結果取得エラー: "+resErr.message); return; }

    // テスト情報をまとめて取得して、id→テスト名などの対応表を作る
    let testMap={};
    if(results && results.length){
      const testIds=[...new Set(results.map(r=>r.test_id))];
      const {data:tests}=await sb.from("tests")
        .select("id,test_name,subject,grade,class_name").in("id",testIds);
      (tests||[]).forEach(t=>{ testMap[t.id]=t; });
    }

    document.getElementById("gate").classList.add("hide");
    document.getElementById("main").classList.remove("hide");
    const list=document.getElementById("resList");
    const empty=document.getElementById("empty");
    list.innerHTML="";
    if(!results||results.length===0){ empty.classList.remove("hide"); return; }
    empty.classList.add("hide");

    results.forEach(r=>{
      const t=testMap[r.test_id]||{};
      const div=document.createElement("div"); div.className="res";
      div.innerHTML=`
        <div class="meta">
          <b>${esc(t.test_name||"テスト")}</b>
          ${esc(t.subject||"")}　${esc(t.grade||"")} ${esc(t.class_name||"")}
        </div>
        <div class="score">${r.score}<small> / ${r.total}点</small></div>`;
      list.appendChild(div);

      // 詳細表示（間違えた問題の確認＋タップ選択で報告）
      const action=document.createElement("div");
      action.style.cssText="padding:10px 0 18px;border-bottom:1px solid var(--line);";

      const detBtn=document.createElement("button");
      detBtn.textContent="▼ どこを間違えたか見る・報告する";
      detBtn.style.cssText="width:auto;margin:0 8px 0 0;padding:8px 14px;font-size:13px;background:#fff;color:var(--navy);border:1px solid var(--line);";
      const detBox=document.createElement("div");
      detBox.className="hide";
      detBox.appendChild(buildStudentDetail(r, action));
      detBtn.onclick=()=>{
        detBox.classList.toggle("hide");
        detBtn.textContent=detBox.classList.contains("hide")?"▼ どこを間違えたか見る・報告する":"▲ 閉じる";
      };
      action.appendChild(detBtn);

      if(r.report_flag){
        const wait=document.createElement("div");
        wait.style.cssText="display:inline-block;background:#fdf3e0;color:#8a5a00;font-size:13px;padding:9px 12px;border-radius:8px;";
        wait.textContent="⏳ 報告を送信しました。先生の確認をお待ちください。";
        action.appendChild(wait);
      }
    action.appendChild(detBox);
    list.appendChild(action);
    });
  }catch(e){
    alert("エラーが発生しました: "+e.message);
  }
}

/* 生徒用：問題ごとの正誤詳細。間違っていると思う問題をタップで選んで報告できる */
function buildStudentDetail(r, actionArea){
  const wrap=document.createElement("div");
  const detail=r.detail||{};
  if(Object.keys(detail).length===0){
    wrap.innerHTML=`<div style="color:#999;font-size:13px;padding:8px;">この結果には問題ごとの詳細データがありません。</div>`;
    return wrap;
  }
  const canReport=!r.report_flag;
  const note=document.createElement("div");
  note.style.cssText="font-size:12px;color:#888;padding:4px 0;";
  note.textContent=canReport
    ? "※ 採点が間違っていると思う問題をタップして選び、下のボタンで先生に報告できます"
    : "※ 報告済みです。先生の確認をお待ちください";
  wrap.appendChild(note);

  const grid=document.createElement("div");
  grid.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;padding:8px 0;";
  wrap.appendChild(grid);

  const selected=new Set();
  const reportBar=document.createElement("div");
  const reportBtn=document.createElement("button");
  reportBtn.style.cssText="width:auto;margin:4px 0 0;padding:9px 16px;font-size:13px;background:var(--red);color:#fff;border:none;";
  reportBar.appendChild(reportBtn);
  reportBar.classList.add("hide");

  const updateBar=()=>{
    if(selected.size>0){
      reportBar.classList.remove("hide");
      const list=[...selected].sort((a,b)=>a-b).map(q=>"第"+q+"問").join("・");
      reportBtn.textContent=`⚑ ${list} の採点間違いを先生に報告する`;
    }else{
      reportBar.classList.add("hide");
    }
  };

  for(let q=1;q<=r.total;q++){
    const d=detail[q]; if(!d) continue;
    const got=(d.got&&d.got.length)?d.got.join("・"):"無解答";
    const cor=(d.correct||d.cor||[]).join("・");
    const bd=d.ok?"#1e7e4f":"#c0392b", bg=d.ok?"#e8f5ec":"#fdecec";
    const card=document.createElement("div");
    card.style.cssText=`border:1px solid ${bd};background:${bg};border-radius:8px;padding:6px 8px;font-size:12px;${canReport?"cursor:pointer;":""}`;
    card.innerHTML=`<b style="color:${bd};">第${q}問 ${d.ok?"○":"×"}</b><br>解答：${esc(got)}${d.ok?"":"<br>正解："+esc(cor)}`;
    if(canReport){
      card.onclick=()=>{
        if(selected.has(q)){
          selected.delete(q);
          card.style.outline="none";
          card.style.boxShadow="none";
        }else{
          selected.add(q);
          card.style.outline="3px solid #e67e22";
          card.style.boxShadow="0 0 0 1px #fff inset";
        }
        updateBar();
      };
    }
    grid.appendChild(card);
  }

  reportBtn.onclick=async()=>{
    if(selected.size===0) return;
    const list=[...selected].sort((a,b)=>a-b).map(q=>"第"+q+"問").join("・");
    if(!confirm(`${list} の採点が間違っていると先生に報告します。よろしいですか？`)) return;
    const msg=`${list} の採点が間違っていると思います`;
    const {error}=await sb.from("results").update({report_flag:true, report_message:msg}).eq("id",r.id);
    if(error){ alert("送信エラー: "+error.message); return; }
    reportBar.innerHTML=`<div style="background:#fdf3e0;color:#8a5a00;font-size:13px;padding:9px 12px;border-radius:8px;">⏳ 報告を送信しました。先生の確認をお待ちください。</div>`;
    if(actionArea){
      const oldBtns=actionArea.querySelectorAll("button");
      oldBtns.forEach(b=>{ if(b.textContent.includes("報告")) b.remove(); });
    }
  };
  wrap.appendChild(reportBar);
  return wrap;
}

function val(id){ return document.getElementById(id).value.trim(); }
function esc(s){ return String(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
</script>
</body>
</html>
