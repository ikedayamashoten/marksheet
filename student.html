<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生徒用画面 | マークシート採点システム</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#1a2747;--gold:#c8a45c;--bg:#f4f5f8;--line:#e2e5ec;--green:#1e7e4f;--red:#c0392b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Yu Gothic","Hiragino Sans",sans-serif;background:var(--bg);color:#222;}
  header{background:var(--navy);color:#fff;padding:16px 28px;display:flex;align-items:center;gap:12px;}
  header h1{font-size:18px;font-weight:700;}
  header .tag{background:var(--gold);color:var(--navy);font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700;}
  .wrap{max-width:720px;margin:30px auto;padding:0 20px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:20px;}
  .card h2{font-size:15px;color:var(--navy);margin-bottom:16px;border-left:4px solid var(--gold);padding-left:10px;}
  label{display:block;font-size:13px;color:#555;margin:10px 0 4px;}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  button{cursor:pointer;border:none;border-radius:8px;font-size:14px;font-weight:700;padding:11px 20px;background:var(--navy);color:#fff;width:100%;margin-top:14px;}
  .gate{max-width:380px;margin:70px auto;}
  .hide{display:none;}
  .res-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px;}
  .res-header{display:flex;justify-content:space-between;align-items:center;}
  .res-meta{font-size:13px;color:#666;}
  .res-meta b{display:block;font-size:15px;color:#222;margin-bottom:2px;}
  .res-score{font-size:28px;font-weight:800;color:var(--navy);text-align:right;}
  .res-score small{font-size:13px;color:#999;font-weight:400;}
  .res-rate{font-size:12px;color:#888;text-align:right;}
  .empty{color:#999;text-align:center;padding:24px;font-size:14px;}
  .report-area{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .btn-report{width:auto;padding:8px 14px;font-size:13px;background:#fff;color:var(--red);border:1px solid var(--red);margin-top:0;}
  .reported{background:#fdf3e0;color:#8a5a00;font-size:13px;padding:9px 12px;border-radius:8px;}
</style>
</head>
<body>
<header>
  <h1>マークシート採点システム</h1>
  <span class="tag">生徒用</span>
</header>

<div class="wrap gate" id="gate">
  <div class="card">
    <h2>成績確認ログイン</h2>
    <label>学校コード</label><input id="code" placeholder="先生から伝えられた学校コード">
    <label>あなたのID</label><input id="sid" placeholder="マークシートに書いたID" onkeydown="if(event.key==='Enter')studentLogin()">
    <button onclick="studentLogin()">成績を確認する</button>
  </div>
</div>

<div class="wrap hide" id="main">
  <div class="card">
    <h2>あなたの成績一覧</h2>
    <div id="resList"></div>
    <div class="empty hide" id="empty">まだ採点結果がありません</div>
  </div>
</div>

<script src="config.js"></script>
<script>
async function studentLogin(){
  const code=val("code"), sid=val("sid");
  if(!code||!sid){ alert("学校コードとIDを入力してください"); return; }
  const {data:school}=await sb.from("marksheet_schools").select("id,name").eq("school_code",code).maybeSingle();
  if(!school){ alert("学校コードが見つかりません"); return; }

  const {data:results}=await sb.from("marksheet_results")
    .select("*, marksheet_tests(test_name,subject,grade,class_name)")
    .eq("school_id",school.id).eq("student_id",sid)
    .order("created_at",{ascending:false});

  document.getElementById("gate").classList.add("hide");
  document.getElementById("main").classList.remove("hide");
  const list=document.getElementById("resList");
  const empty=document.getElementById("empty");
  list.innerHTML="";

  if(!results||results.length===0){ empty.classList.remove("hide"); return; }

  results.forEach(r=>{
    const t=r.marksheet_tests||{};
    const rate=r.total>0?Math.round(r.score/r.total*100)+"%":"--";
    const card=document.createElement("div"); card.className="res-card";

    const header=document.createElement("div"); header.className="res-header";
    header.innerHTML=`
      <div class="res-meta">
        <b>${esc(t.test_name||"テスト")}</b>
        ${esc(t.subject||"")}　${esc(t.grade||"")} ${esc(t.class_name||"")}
      </div>
      <div>
        <div class="res-score">${r.score}<small> / ${r.total}点</small></div>
        <div class="res-rate">正答率 ${rate}</div>
      </div>`;
    card.appendChild(header);

    const reportArea=document.createElement("div"); reportArea.className="report-area";
    if(r.report_flag){
      reportArea.innerHTML=`<div class="reported">⏳ 報告を送信しました。先生の確認をお待ちください。</div>`;
    }else{
      const btn=document.createElement("button"); btn.className="btn-report";
      btn.textContent="⚑ 採点の間違いを報告する";
      btn.onclick=()=>sendReport(r.id, reportArea);
      reportArea.appendChild(btn);
    }
    card.appendChild(reportArea);
    list.appendChild(card);
  });
}

async function sendReport(resultId, areaEl){
  const msg=prompt("先生に伝えたい内容を入力してください（任意）\n例：第3問はBを塗ったのに不正解になっています","");
  if(msg===null) return;
  const {error}=await sb.from("marksheet_results").update({report_flag:true, report_message:msg}).eq("id",resultId);
  if(error){ alert("送信エラー: "+error.message); return; }
  areaEl.innerHTML=`<div class="reported">⏳ 報告を送信しました。先生の確認をお待ちください。</div>`;
}

function val(id){ return document.getElementById(id).value.trim(); }
function esc(s){ return String(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
</script>
</body>
</html>
